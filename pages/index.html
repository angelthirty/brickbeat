<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#050914">
  <title>BRICKBEAT — 네온 벽돌 깨기</title>
  <style>
    :root{--cyan:#45c8ff;--purple:#9b7bff;--line:rgba(139,163,196,.18)}*{box-sizing:border-box}html{background:#050914}body{margin:0;color:#eef4ff;background:radial-gradient(circle at 78% 42%,rgba(72,74,155,.16),transparent 35%),#050914;font-family:"Segoe UI",Arial,sans-serif;min-height:100vh;overflow-x:hidden}.shell{width:min(1460px,100%);margin:auto;min-height:100vh;padding:24px clamp(20px,4vw,72px) 34px}.top{height:55px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px;font-weight:900;letter-spacing:-.06em;font-size:18px}.brand b{color:var(--cyan)}.mark{width:19px;height:19px;border:3px solid var(--cyan);transform:rotate(45deg);box-shadow:0 0 12px rgba(69,200,255,.7);position:relative}.mark:after{content:"";position:absolute;inset:3px;background:var(--purple)}.online{color:#8d9ab2;font:700 10px ui-monospace,monospace;letter-spacing:.16em;border:1px solid var(--line);padding:7px 10px}.online i{display:inline-block;width:6px;height:6px;margin-right:7px;border-radius:50%;background:#58e7b3;box-shadow:0 0 8px #58e7b3}.layout{min-height:calc(100vh - 114px);display:grid;grid-template-columns:minmax(235px,.72fr) minmax(580px,2.15fr);gap:clamp(32px,5vw,84px);align-items:center;padding:30px 0 8px}.intro{padding-bottom:20px}.eyebrow{color:var(--cyan);letter-spacing:.22em;font:800 10px ui-monospace,monospace;margin:0 0 22px}h1{margin:0;font-size:clamp(48px,5.6vw,90px);line-height:.88;letter-spacing:-.085em;text-transform:uppercase;font-weight:950}h1 em{color:transparent;font-style:normal;-webkit-text-stroke:1.4px var(--purple);text-shadow:0 0 25px rgba(155,123,255,.28)}.lead{margin:28px 0 26px;color:#9ca8bd;font-size:13px;line-height:1.8}.controls{max-width:310px;border-top:1px solid var(--line);display:grid;grid-template-columns:65px 1fr;gap:13px 12px;padding-top:19px;align-items:center}.controls>span{font:800 9px ui-monospace,monospace;letter-spacing:.15em;color:#68748c}.controls div{display:flex;align-items:center;gap:5px}kbd{min-width:29px;padding:5px 8px;text-align:center;border:1px solid #34425b;border-bottom-color:#56637b;border-radius:4px;color:#b9c6dc;background:#0c1424;font:700 10px ui-monospace,monospace}.controls small{margin-left:6px;color:#5f6b82;font-size:9px;white-space:nowrap}.game{width:100%;max-width:1000px;justify-self:end}.hud{display:grid;grid-template-columns:1.5fr .8fr 1.1fr .9fr;background:#0b1221;border:1px solid var(--line);border-bottom:0;padding:12px 20px}.hud>div{display:flex;flex-direction:column;border-right:1px solid var(--line);padding-left:20px}.hud>div:first-child{padding-left:0}.hud>div:last-child{border:0;text-align:right}.hud span{color:#647089;font:800 8px ui-monospace,monospace;letter-spacing:.16em}.hud strong{margin-top:3px;color:#f3f7ff;font:800 clamp(14px,1.25vw,19px) ui-monospace,monospace;letter-spacing:.05em}.hud .lives{color:#ff4d8d;font-size:13px;letter-spacing:.2em;text-shadow:0 0 9px rgba(255,77,141,.7)}.hud .combo{color:#ffd84d}.frame{position:relative;aspect-ratio:3/2;border:1px solid rgba(69,200,255,.23);background:#08101f;box-shadow:0 28px 80px rgba(0,0,0,.42);overflow:hidden}canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}.scan{pointer-events:none;position:absolute;inset:0;opacity:.13;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(110,174,255,.1) 4px)}.overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(18,31,59,.65),rgba(5,9,20,.86));backdrop-filter:blur(3px);text-align:center}.overlay.hide{display:none}.overlay p{margin:0 0 8px;color:var(--cyan);letter-spacing:.34em;font:800 9px ui-monospace,monospace}.overlay h2{margin:0;font-size:clamp(42px,7vw,82px);line-height:1;letter-spacing:-.07em;font-weight:950;text-shadow:0 0 35px rgba(155,123,255,.38)}.overlay span{color:#8f9bb0;font-size:12px;margin-top:11px}.overlay button{margin-top:25px;min-width:162px;padding:12px 14px 12px 22px;display:flex;justify-content:space-between;color:#07101e;background:linear-gradient(90deg,var(--cyan),#70e3ff);border:0;font-weight:900;font-size:12px;cursor:pointer}.footer{display:flex;align-items:center;gap:20px;color:#657087;font:700 8px ui-monospace,monospace;letter-spacing:.09em;padding:11px 5px 0}.footer i{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px}.wide{background:#58e7b3;box-shadow:0 0 7px #58e7b3}.life{background:#ff4d8d;box-shadow:0 0 7px #ff4d8d}.sound{margin-left:auto;color:#8490a8;background:none;border:0;font:700 8px ui-monospace,monospace;cursor:pointer}@media(max-width:900px){.shell{padding:18px}.layout{grid-template-columns:1fr;gap:24px;padding-top:28px}.intro{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;padding:0}.intro h1{grid-row:span 2;font-size:clamp(45px,10vw,72px)}.eyebrow,.lead,.controls{grid-column:2}.controls{display:none}.game{max-width:none}}@media(max-width:560px){.intro{display:block}.intro h1{font-size:50px}.lead{margin:17px 0 0}.hud{padding:9px 10px;grid-template-columns:1.4fr .7fr .9fr}.hud>div{padding-left:9px}.hud>div:last-child{display:none}.frame{aspect-ratio:1/.78}.overlay h2{font-size:44px}}
  </style>
</head>
<body>
<main class="shell"><header class="top"><div class="brand"><span class="mark"></span><span>BRICK<b>BEAT</b></span></div><div class="online"><i></i>ARCADE ONLINE</div></header>
<section class="layout"><aside class="intro"><p class="eyebrow">NEON BREAKOUT · 01</p><h1>깨고,<br><em>튕기고,</em><br>기록하라.</h1><p class="lead">빛나는 벽돌을 쓸어버리고<br>3개의 스테이지를 돌파하세요.</p><div class="controls"><span>MOVE</span><div><kbd>←</kbd><kbd>→</kbd><small>마우스 · 터치</small></div><span>PAUSE</span><div><kbd>SPACE</kbd><small>일시정지</small></div></div></aside>
<div class="game"><div class="hud"><div><span>SCORE</span><strong id="score">000000</strong></div><div><span>STAGE</span><strong id="stage">01</strong></div><div><span>LIVES</span><strong class="lives" id="lives">●●●</strong></div><div><span>COMBO</span><strong class="combo" id="combo">×0</strong></div></div>
<div class="frame"><canvas id="board" aria-label="벽돌 깨기 게임 화면"></canvas><div class="overlay" id="overlay"><p>BRICK BEAT</p><h2 id="message">READY?</h2><span id="sub">네온 벽돌을 모두 깨뜨리세요</span><button id="start">게임 시작 <b>→</b></button></div><div class="scan"></div></div>
<div class="footer"><span><i class="wide"></i>WIDE PADDLE</span><span><i class="life"></i>EXTRA LIFE</span><button class="sound" id="sound">SOUND ON</button></div></div></section></main>
<script>
(()=>{const C=document.querySelector('#board'),X=C.getContext('2d'),O=document.querySelector('#overlay'),M=document.querySelector('#message'),S=document.querySelector('#sub'),B=document.querySelector('#start'),W=900,H=600,colors=['#ff4d8d','#ff7b4d','#ffd84d','#58e7b3','#45c8ff','#9b7bff'];let phase='ready',score=0,lives=3,level=1,combo=0,paddle={x:386,w:128},balls=[],bricks=[],drops=[],keys={},last=0,wideUntil=0,sound=true;
const el=id=>document.querySelector(id),hud=()=>{el('#score').textContent=String(score).padStart(6,'0');el('#stage').textContent='0'+level;el('#lives').textContent='●'.repeat(lives);el('#combo').textContent='×'+combo},tone=(f,d=.045)=>{if(!sound)return;try{const a=new AudioContext,o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.035,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+d)}catch(e){}},makeBricks=()=>{bricks=[];let rows=4+level,gap=9,w=(W-120-gap*9)/10;for(let r=0;r<rows;r++)for(let c=0;c<10;c++){let hp=level>1&&(r+c+level)%4===0?2:1;bricks.push({x:60+c*(w+gap),y:72+r*34,w,h:23,hp,max:hp,color:colors[r%6],alive:true})}},resetBall=()=>{paddle.x=W/2-paddle.w/2;balls=[{x:W/2,y:H-92,vx:(Math.random()>.5?1:-1)*255,vy:-315,r:8}];combo=0},start=()=>{score=0;lives=3;level=1;combo=0;paddle.w=128;drops=[];makeBricks();resetBall();hud();phase='running';O.classList.add('hide');tone(440,.08)},show=(title,sub,button)=>{M.textContent=title;S.textContent=sub;B.textContent=button+' →';O.classList.remove('hide')},pause=()=>{if(phase==='running'){phase='paused';show('PAUSED','계속하려면 스페이스','계속하기')}else if(phase==='paused'){phase='running';O.classList.add('hide')}};
B.onclick=()=>phase==='ready'||phase==='over'||phase==='won'?start():pause();el('#sound').onclick=e=>{sound=!sound;e.target.textContent=sound?'SOUND ON':'SOUND OFF'};addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')keys.l=true;if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')keys.r=true;if(e.key===' '||e.key.toLowerCase()==='p'){if(phase==='ready')start();else pause()}});addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')keys.l=false;if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')keys.r=false});const move=x=>{let r=C.getBoundingClientRect();paddle.x=Math.max(22,Math.min(W-22-paddle.w,(x-r.left)/r.width*W-paddle.w/2))};C.onpointermove=e=>move(e.clientX);C.onpointerdown=e=>{move(e.clientX);if(phase==='ready')start()};
function update(t,dt){if(keys.l)paddle.x-=470*dt;if(keys.r)paddle.x+=470*dt;if(wideUntil&&t>wideUntil){paddle.w=128;wideUntil=0}paddle.x=Math.max(22,Math.min(W-22-paddle.w,paddle.x));let next=[];for(const b of balls){b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.x-b.r<16){b.x=16+b.r;b.vx=Math.abs(b.vx)}if(b.x+b.r>W-16){b.x=W-16-b.r;b.vx=-Math.abs(b.vx)}if(b.y-b.r<16){b.y=16+b.r;b.vy=Math.abs(b.vy)}let py=H-47;if(b.vy>0&&b.y+b.r>=py&&b.y-b.r<=py+16&&b.x>=paddle.x&&b.x<=paddle.x+paddle.w){let hit=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2),speed=Math.min(510,Math.hypot(b.vx,b.vy)+7);b.vx=speed*hit*.9;b.vy=-Math.sqrt(Math.max(15000,speed*speed-b.vx*b.vx));b.y=py-b.r;tone(230)}for(const q of bricks){if(!q.alive||b.x+b.r<q.x||b.x-b.r>q.x+q.w||b.y+b.r<q.y||b.y-b.r>q.y+q.h)continue;let ox=Math.min(b.x+b.r-q.x,q.x+q.w-(b.x-b.r)),oy=Math.min(b.y+b.r-q.y,q.y+q.h-(b.y-b.r));ox<oy?b.vx*=-1:b.vy*=-1;if(--q.hp<=0){q.alive=false;combo++;score+=100*level+Math.min(combo,10)*10;if(Math.random()<.075)drops.push({x:q.x+q.w/2,y:q.y,vy:110,type:Math.random()<.78?'wide':'life'})}else score+=30;tone(310+combo*16);break}if(b.y-b.r<=H)next.push(b)}balls=next;drops=drops.filter(d=>{d.y+=d.vy*dt;if(d.y>H)return false;if(d.y>H-57&&d.x>=paddle.x&&d.x<=paddle.x+paddle.w){if(d.type==='wide'){paddle.w=190;wideUntil=t+9000}else lives=Math.min(5,lives+1);score+=250;tone(720,.1);return false}return true});if(!balls.length){if(--lives<=0){phase='over';show('GAME OVER','다시 도전해 보세요','다시 시작');tone(90,.3)}else{resetBall();phase='paused';setTimeout(()=>{phase='running';O.classList.add('hide')},650)}}if(!bricks.some(q=>q.alive)){if(level>=3){phase='won';show('CLEAR!','3개 스테이지를 모두 정복했습니다','다시 시작');tone(880,.25)}else{level++;makeBricks();drops=[];resetBall();tone(620,.16)}}hud()}
function draw(){X.setTransform(C.width/W,0,0,C.height/H,0,0);X.clearRect(0,0,W,H);X.fillStyle='#08101f';X.fillRect(0,0,W,H);X.strokeStyle='rgba(84,215,255,.055)';for(let x=15;x<W;x+=30){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}for(let y=15;y<H;y+=30){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}for(const q of bricks){if(!q.alive)continue;X.save();X.shadowColor=q.color;X.shadowBlur=10;X.fillStyle=q.hp<q.max?'#dbeaff':q.color;X.beginPath();X.roundRect(q.x,q.y,q.w,q.h,5);X.fill();X.restore()}let g=X.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);g.addColorStop(0,'#45c8ff');g.addColorStop(1,'#9b7bff');X.save();X.shadowColor='#45c8ff';X.shadowBlur=18;X.fillStyle=g;X.beginPath();X.roundRect(paddle.x,H-47,paddle.w,14,8);X.fill();X.restore();for(const b of balls){X.save();X.shadowColor='#fff';X.shadowBlur=18;X.fillStyle='#fff';X.beginPath();X.arc(b.x,b.y,b.r,0,Math.PI*2);X.fill();X.restore()}for(const d of drops){X.fillStyle=d.type==='wide'?'#58e7b3':'#ff4d8d';X.beginPath();X.roundRect(d.x-15,d.y-10,30,20,6);X.fill();X.fillStyle='#07101e';X.font='bold 12px monospace';X.textAlign='center';X.fillText(d.type==='wide'?'W':'+1',d.x,d.y+4)}}function loop(t){let dt=Math.min((t-(last||t))/1000,.025);last=t;if(phase==='running')update(t,dt);draw();requestAnimationFrame(loop)}new ResizeObserver(()=>{let r=C.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);C.width=r.width*d;C.height=r.height*d}).observe(C);makeBricks();resetBall();requestAnimationFrame(loop)})();
</script></body></html>
